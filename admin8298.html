<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{background:#111;color:#fff;font-family:Arial;padding:20px}
.card{background:#1f1f1f;padding:15px;border-radius:10px;margin:10px 0}
button{padding:8px 12px;margin:5px;background:#00ffcc;border:none;border-radius:5px}
</style>
</head>
<body>

<h1>👑 Prime Earn Admin</h1>

<h2>💰 Revenue: ₹<span id="revenue">0</span></h2>

<h2>💳 Pending Payments</h2>
<div id="payments"></div>

<h2>👥 Users</h2>
<div id="users"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCJIU56dxgxS2cIh99zSvp_FAn9hrSSl0g",
  authDomain: "prime-earn-49202.firebaseapp.com",
  databaseURL: "https://prime-earn-49202-default-rtdb.firebaseio.com",
  projectId: "prime-earn-49202",
  storageBucket: "prime-earn-49202.firebasestorage.app",
  messagingSenderId: "533446392320",
  appId: "1:533446392320:web:5cdda6a2fb9a57870eb6e5"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let totalRevenue=0;

onValue(ref(db,"payments"),(snap)=>{
let html="";
snap.forEach(child=>{
let d=child.val();
html+=`
<div class="card">
<p>${d.email}</p>
<p>UTR: ${d.utr}</p>
<button onclick="approve('${child.key}','${d.uid}',${d.amount})">Approve</button>
<button onclick="reject('${child.key}')">Reject</button>
</div>`;
});
document.getElementById("payments").innerHTML=html;
});

window.approve=(id,uid,amount)=>{
update(ref(db,"users/"+uid),{
subscription:"active"
});
remove(ref(db,"payments/"+id));
totalRevenue+=amount;
document.getElementById("revenue").innerText=totalRevenue;
alert("Approved");
}

window.reject=(id)=>{
remove(ref(db,"payments/"+id));
alert("Rejected");
}

onValue(ref(db,"users"),(snap)=>{
let html="";
snap.forEach(child=>{
let d=child.val();
html+=`
<div class="card">
<p>${d.email}</p>
<p>Subscription: ${d.subscription}</p>
<button onclick="ban('${child.key}')">Ban</button>
</div>`;
});
document.getElementById("users").innerHTML=html;
});

window.ban=(id)=>{
update(ref(db,"users/"+id),{banned:true});
alert("User Banned");
}

</script>

</body>
</html>
