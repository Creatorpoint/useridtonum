<!DOCTYPE html>
<html>
<head>
<title>Prime - Premium Telegram Search</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;background:#0f0f0f;color:#fff;font-family:Arial;text-align:center}
.container{max-width:500px;margin:auto;padding:20px}
input{width:100%;padding:12px;margin:10px 0;border-radius:8px;border:none}
button{width:100%;padding:12px;background:#00ffcc;border:none;border-radius:8px;font-weight:bold;cursor:pointer}
.card{background:#1f1f1f;padding:15px;border-radius:10px;margin-top:15px}
.hidden{display:none}
</style>
</head>
<body>

<div class="container">

<h1>🔥 Prime Earn Premium</h1>

<div id="authBox">
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>
</div>

<div id="dashboard" class="hidden">

<h2>🔎 Telegram Search</h2>
<input type="text" id="userid" placeholder="Enter Telegram User ID">
<button onclick="searchUser()">Search</button>

<div id="result"></div>

<hr>

<h2>💎 Premium Subscription</h2>
<p>Scan QR & Enter UTR</p>
<img src="YOUR_QR_IMAGE_LINK" width="200">

<input type="text" id="utr" placeholder="Enter UTR">
<button onclick="submitPayment()">Submit Payment</button>

<button onclick="logout()">Logout</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, set, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCJIU56dxgxS2cIh99zSvp_FAn9hrSSl0g",
  authDomain: "prime-earn-49202.firebaseapp.com",
  databaseURL: "https://prime-earn-49202-default-rtdb.firebaseio.com",
  projectId: "prime-earn-49202",
  storageBucket: "prime-earn-49202.firebasestorage.app",
  messagingSenderId: "533446392320",
  appId: "1:533446392320:web:5cdda6a2fb9a57870eb6e5"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let currentUser=null;

onAuthStateChanged(auth,(user)=>{
if(user){
currentUser=user;
document.getElementById("authBox").classList.add("hidden");
document.getElementById("dashboard").classList.remove("hidden");

checkSubscription();
}else{
document.getElementById("authBox").classList.remove("hidden");
document.getElementById("dashboard").classList.add("hidden");
}
});

window.signup=()=>{
createUserWithEmailAndPassword(auth,email.value,password.value)
.then(res=>{
set(ref(db,"users/"+res.user.uid),{
email:res.user.email,
subscription:"none",
banned:false,
apiUsage:0
});
});
}

window.login=()=>{
signInWithEmailAndPassword(auth,email.value,password.value);
}

window.logout=()=>{signOut(auth);}

function checkSubscription(){
onValue(ref(db,"users/"+currentUser.uid),(snap)=>{
let data=snap.val();
if(data.banned){
alert("Account Banned");
logout();
}
if(data.subscription!="active"){
alert("Buy Premium to Use Search");
}
});
}

window.searchUser=async()=>{
let id=document.getElementById("userid").value;

onValue(ref(db,"users/"+currentUser.uid),(snap)=>{
let data=snap.val();
if(data.subscription!="active"){
alert("Premium Required");
return;
}
});

let res=await fetch("https://tg-2-num-api-org.vercel.app/api/search?userid="+id);
let data=await res.json();

update(ref(db,"users/"+currentUser.uid),{
apiUsage: (Math.random()*10)+1
});

document.getElementById("result").innerHTML=`
<div class="card">
<p>Name: ${data.name||"N/A"}</p>
<p>Username: ${data.username||"N/A"}</p>
<p>ID: ${data.id||"N/A"}</p>
</div>`;
}

window.submitPayment=()=>{
push(ref(db,"payments"),{
uid:currentUser.uid,
email:currentUser.email,
utr:utr.value,
status:"pending",
amount:99,
time:Date.now()
});
alert("Payment Submitted");
}

</script>

</body>
</html>
